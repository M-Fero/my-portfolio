<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostafa Fero | Game Developer</title>

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        orange: {
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            900: '#7c2d12',
                        },
                        dark: {
                            bg: '#000000',
                            surface: '#111111',
                            border: '#222222',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-300 font-sans antialiased flex flex-col md:flex-row min-h-screen selection:bg-orange-500 selection:text-white">

    <!-- Mobile Header -->
    <header class="md:hidden bg-dark-surface border-b border-dark-border p-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div>
            <h1 id="mobile-name" class="text-xl font-bold text-white"></h1>
            <p id="mobile-title" class="text-xs text-orange-500 font-medium"></p>
        </div>
        <button id="mobile-menu-btn" class="text-gray-300 hover:text-orange-500 transition-colors focus:outline-none active:scale-90 transform duration-200">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </header>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="bg-dark-surface border-r border-dark-border w-full md:w-72 md:flex flex-col hidden md:sticky md:top-0 md:h-screen shadow-2xl z-40 md:z-0 transition-all duration-300">
        <div class="p-8 flex-grow overflow-y-auto">
            <div class="text-center mb-8 hidden md:block group cursor-pointer">
                <div class="w-32 h-32 mx-auto bg-[#1a1a1a] rounded-full flex items-center justify-center mb-4 border-4 border-[#222] shadow-[0_0_15px_rgba(0,0,0,0.5)] overflow-hidden transition-all duration-500 group-hover:border-orange-500 group-hover:shadow-[0_0_25px_rgba(249,115,22,0.3)]">
                    <img id="sidebar-profile-img" src="" alt="Mostafa Fero" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                </div>
                <h2 id="sidebar-name" class="text-2xl font-bold text-white transition-colors duration-300 group-hover:text-orange-500"></h2>
                <p id="sidebar-title" class="text-orange-500 mt-1 font-medium tracking-wide"></p>
            </div>

            <nav>
                <ul id="nav-links" class="space-y-3">
                    <li><a href="#" data-page="home" class="nav-link block py-3 px-4 rounded-lg font-medium transition-all duration-300 hover:scale-105 active:scale-95 flex items-center group"><i class="fas fa-home w-8 text-center transition-transform group-hover:scale-125"></i> Profile</a></li>
                    <li><a href="#" data-page="projects" class="nav-link block py-3 px-4 rounded-lg font-medium transition-all duration-300 hover:scale-105 active:scale-95 flex items-center group"><i class="fas fa-gamepad w-8 text-center transition-transform group-hover:scale-125"></i> Projects</a></li>
                    <li><a href="#" data-page="skills" class="nav-link block py-3 px-4 rounded-lg font-medium transition-all duration-300 hover:scale-105 active:scale-95 flex items-center group"><i class="fas fa-code w-8 text-center transition-transform group-hover:scale-125"></i> Skills</a></li>
                    <li><a href="#" data-page="experience" class="nav-link block py-3 px-4 rounded-lg font-medium transition-all duration-300 hover:scale-105 active:scale-95 flex items-center group"><i class="fas fa-briefcase w-8 text-center transition-transform group-hover:scale-125"></i> Experience</a></li>
                    <li><a href="#" data-page="contact" class="nav-link block py-3 px-4 rounded-lg font-medium transition-all duration-300 hover:scale-105 active:scale-95 flex items-center group"><i class="fas fa-envelope w-8 text-center transition-transform group-hover:scale-125"></i> Contact</a></li>
                </ul>
            </nav>

            <a id="sidebar-cv-link" href="#" target="_blank" class="mt-8 hidden md:flex items-center justify-center w-full bg-transparent border border-orange-500 text-orange-500 font-bold py-3 px-4 rounded-lg transition-all hover:bg-orange-500 hover:text-white hover:shadow-[0_0_15px_rgba(249,115,22,0.4)] active:scale-95">
                <i class="fas fa-download mr-2"></i> Download CV
            </a>
        </div>

        <div class="p-8 bg-black bg-opacity-50 flex justify-center space-x-6 border-t border-dark-border">
            <a id="social-linkedin" href="#" target="_blank" class="text-gray-500 hover:text-orange-500 hover:scale-125 transition-all duration-300 text-xl"><i class="fab fa-linkedin"></i></a>
            <a id="social-github" href="#" class="text-gray-500 hover:text-orange-500 hover:scale-125 transition-all duration-300 text-xl"><i class="fab fa-github"></i></a>
            <a id="social-discord" href="#" class="text-gray-500 hover:text-orange-500 hover:scale-125 transition-all duration-300 text-xl"><i class="fab fa-discord"></i></a>
            <a id="social-spotify" href="#" target="_blank" class="text-gray-500 hover:text-orange-500 hover:scale-125 transition-all duration-300 text-xl"><i class="fab fa-spotify"></i></a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 p-6 md:p-12 overflow-y-auto relative">
        <!-- Subtle background glow -->
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-orange-600/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

        <div id="content-area" class="max-w-4xl mx-auto z-10">
            <!-- Dynamic content injected here -->
        </div>
    </main>

    <!-- Portfolio Data & Scripts -->
    <script src="js/content.js"></script>
    <script src="js/main.js"></script>

    <!-- Initialize Sidebar with Personal Info -->
    <script>
        // Populate sidebar and header with personal info when page loads
        window.addEventListener('DOMContentLoaded', () => {
            // Update mobile header
            document.getElementById('mobile-name').textContent = personalInfo.name;
            document.getElementById('mobile-title').textContent = personalInfo.title;

            // Update sidebar
            document.getElementById('sidebar-profile-img').src = personalInfo.profileImage;
            document.getElementById('sidebar-profile-img').alt = personalInfo.name;
            document.getElementById('sidebar-name').textContent = personalInfo.name;
            document.getElementById('sidebar-title').textContent = personalInfo.title;
            document.getElementById('sidebar-cv-link').href = personalInfo.cvFile;

            // Update social links
            document.getElementById('social-linkedin').href = personalInfo.socialLinks.linkedin;
            document.getElementById('social-github').href = personalInfo.socialLinks.github;
            document.getElementById('social-discord').href = personalInfo.socialLinks.discord;
            document.getElementById('social-spotify').href = personalInfo.socialLinks.spotify;
        });
    </script>
</body>
</html>
